name: CodeQL Advanced

on:
  push:
    branches: [main]
  schedule:
    # Deep scan nightly
    - cron: "0 2 * * *"

jobs:
  analyze:
    name: Analyze with custom queries (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Run the full security-and-quality suite plus local custom queries
          queries: +security-and-quality
          # Point at local .ql files (see codeql-queries/ directory)
          config: |
            query-filters:
              - exclude:
                  problem.severity: recommendation
            paths-ignore:
              - node_modules
              - vendor
              - "**/*.test.*"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}/advanced"
          upload: always
