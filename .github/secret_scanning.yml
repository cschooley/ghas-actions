# Custom secret scanning patterns for GitHub Secret Scanning
# See: https://docs.github.com/en/code-security/secret-scanning/defining-custom-patterns-for-secret-scanning

# GitHub Secret Scanning custom patterns are configured in:
#   Settings → Security → Secret scanning → Custom patterns
#
# This file documents the patterns used in this repo for source-control.
# The actual enforcement happens in GitHub's UI/API, not via this file.

# Example patterns (add via GitHub UI with these regexes):
#
# Pattern name:  Internal API Key
# Regex:         (?i)(internal[_-]?api[_-]?key|int[_-]?api)[\"'\s:=]+([a-z0-9]{32,64})
# Test string:   internal_api_key="abc123def456abc123def456abc123de"
#
# Pattern name:  JWT with HS256 secret
# Regex:         eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]{43,}
#
# Pattern name:  Generic high-entropy secret
# Regex:         (?i)(secret|password|passwd|pwd|token|apikey|api_key)[\"'\s:=]+[\"']([A-Za-z0-9+/]{40,}={0,2})[\"']
